<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>산업안전기사 CBT</title>
  <style>
    :root {
      --bg: #f2f4f7;
      --panel: #ffffff;
      --line: #d9dde3;
      --text: #1f2937;
      --muted: #6b7280;
      --dark: #111827;
      --blue: #1d4ed8;
      --blue-light: #e8f0ff;
      --green: #15803d;
      --green-light: #e8f7ee;
      --red: #b91c1c;
      --red-light: #fdecec;
      --yellow: #f59e0b;
      --yellow-light: #fff7df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .topbar {
      background: var(--dark);
      color: #fff;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 800;
      white-space: nowrap;
    }

    .topbar-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 7px 10px;
      border-radius: 999px;
      font-weight: 700;
    }

    .layout {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 18px;
    }

    .exam-panel,
    .side-panel,
    .result-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(17, 24, 39, 0.06);
    }

    .exam-panel {
      min-height: 620px;
      display: flex;
      flex-direction: column;
    }

    .exam-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      background: #fbfcfe;
      border-radius: 12px 12px 0 0;
    }

    .exam-head strong { font-size: 18px; }

    .exam-body {
      padding: 26px 28px;
      flex: 1;
    }

    .question-number {
      font-size: 15px;
      color: var(--blue);
      font-weight: 800;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 22px;
      line-height: 1.55;
      font-weight: 800;
      margin-bottom: 26px;
      word-break: keep-all;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 15px 16px;
      border: 2px solid var(--line);
      border-radius: 10px;
      cursor: pointer;
      background: #fff;
      transition: 0.15s;
      line-height: 1.45;
      font-size: 17px;
      min-height: 58px;
    }

    .option:hover {
      border-color: #9ca3af;
      background: #fafafa;
    }

    .option input {
      margin-top: 4px;
      transform: scale(1.25);
      accent-color: var(--blue);
    }

    .option.selected {
      border-color: var(--blue);
      background: var(--blue-light);
      font-weight: 800;
    }

    .option.correct-answer {
      border-color: var(--green);
      background: var(--green-light);
    }

    .option.wrong-answer {
      border-color: var(--red);
      background: var(--red-light);
    }

    .exam-foot {
      padding: 18px 22px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      background: #fbfcfe;
      border-radius: 0 0 12px 12px;
    }

    button {
      border: 0;
      cursor: pointer;
      font-family: inherit;
      font-weight: 800;
      border-radius: 9px;
      padding: 12px 16px;
      font-size: 15px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .btn-light {
      background: #eef1f5;
      color: var(--dark);
      border: 1px solid #d5d9df;
    }

    .btn-dark {
      background: var(--dark);
      color: #fff;
    }

    .btn-blue {
      background: var(--blue);
      color: #fff;
    }

    .btn-red {
      background: var(--red);
      color: #fff;
    }

    .side-panel {
      padding: 16px;
      align-self: start;
      position: sticky;
      top: 78px;
    }

    .side-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .progress-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .page-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .page-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 10px 8px;
      font-size: 13px;
    }

    .page-btn.active {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    .answer-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .nav-num {
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 15px;
      padding: 0;
    }

    .nav-num.current {
      outline: 3px solid rgba(29, 78, 216, 0.25);
      border-color: var(--blue);
      color: var(--blue);
    }

    .nav-num.answered {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .nav-num.marked {
      position: relative;
      border-color: var(--yellow);
      background: var(--yellow-light);
      color: #92400e;
    }

    .nav-num.correct {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .nav-num.wrong {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .legend {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin: 12px 0 16px;
    }

    .legend span::before {
      content: "";
      width: 12px;
      height: 12px;
      display: inline-block;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: -1px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .legend .lg-current::before {
      border-color: var(--blue);
      outline: 2px solid rgba(29, 78, 216, 0.25);
    }

    .legend .lg-answered::before {
      background: var(--blue);
      border-color: var(--blue);
    }

    .legend .lg-marked::before {
      background: var(--yellow-light);
      border-color: var(--yellow);
    }

    .side-actions {
      display: grid;
      gap: 8px;
    }

    .result-panel {
      display: none;
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto 18px;
      padding: 20px;
    }

    .result-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .score-big {
      font-size: 36px;
      font-weight: 900;
      margin: 8px 0 6px;
    }

    .score-detail {
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 16px;
    }

    .explanation {
      margin-top: 18px;
      background: #f8fafc;
      border-left: 6px solid var(--blue);
      padding: 16px;
      border-radius: 8px;
      line-height: 1.65;
      font-size: 15px;
    }

    .status-line {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      font-weight: 900;
      display: none;
    }

    .status-line.correct {
      display: block;
      background: var(--green-light);
      color: var(--green);
    }

    .status-line.wrong {
      display: block;
      background: var(--red-light);
      color: var(--red);
    }

    .mark-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      user-select: none;
    }

    .mark-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--yellow);
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .side-panel {
        position: static;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .topbar-info {
        justify-content: flex-start;
      }

      .question-text {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-title">산업안전기사 필기 CBT</div>
    <div class="topbar-info">
      <span class="pill" id="page-title">1페이지 / 10문제</span>
      <span class="pill" id="timer">00:00</span>
      <span class="pill" id="answered-count">답안 0 / 10</span>
    </div>
  </header>

  <main class="layout">
    <section class="exam-panel">
      <div class="exam-head">
        <strong id="subject-title">제1과목 : 산업재해 예방 및 안전보건교육</strong>
        <label class="mark-row">
          <input type="checkbox" id="mark-checkbox" onchange="toggleMark()" />
          검토 표시
        </label>
      </div>

      <div class="exam-body">
        <div class="question-number" id="question-number"></div>
        <div class="question-text" id="question-text"></div>
        <div class="options" id="options"></div>
        <div class="status-line" id="status-line"></div>
        <div class="explanation" id="explanation" style="display:none;"></div>
      </div>

      <div class="exam-foot">
        <div>
          <button class="btn-light" id="prev-btn" onclick="prevQuestion()">이전 문제</button>
          <button class="btn-light" id="next-btn" onclick="nextQuestion()">다음 문제</button>
        </div>
        <div>
          <button class="btn-light" id="prev-page-btn" onclick="prevPage()">이전 10문제</button>
          <button class="btn-light" id="next-page-btn" onclick="nextPage()">다음 10문제</button>
          <button class="btn-red" onclick="resetCurrentPage()">현재 페이지 다시 풀기</button>
          <button class="btn-blue" id="submit-btn" onclick="submitExam()">최종 제출</button>
        </div>
      </div>
    </section>

    <aside class="side-panel">
      <div class="side-title">페이지 선택</div>
      <div class="page-grid" id="page-grid"></div>

      <div class="side-title">답안 현황</div>
      <div class="progress-text" id="progress-text">
        문제 번호를 누르면 해당 문제로 이동합니다.
      </div>
      <div class="answer-grid" id="answer-grid"></div>
      <div class="legend">
        <span class="lg-current">현재 문제</span>
        <span class="lg-answered">답안 선택</span>
        <span class="lg-marked">검토 표시</span>
      </div>
      <div class="side-actions">
        <button class="btn-dark" onclick="goFirstUnanswered()">미응답 문제로 이동</button>
        <button class="btn-blue" id="side-submit-btn" onclick="submitExam()">최종 제출</button>
      </div>
    </aside>
  </main>

  <section class="result-panel" id="result-panel">
    <div class="result-title">채점 결과</div>
    <div class="score-big" id="score-big"></div>
    <div class="score-detail" id="score-detail"></div>
    <button class="btn-dark" onclick="showReviewMode()">해설 보면서 다시 확인</button>
  </section>

  <script>
    const QUESTIONS_PER_PAGE = 10;

    const quizPages = [
      [
        {
          id: 1,
          subject: "제1과목 : 산업재해 예방 및 안전보건교육",
          question: "안전관리의 조직형태 중에서 경영자(수뇌부)의 지휘와 명령이 위에서 아래로 하나의 계통이 되어 잘 전달되며 소규모 기업에 적합한 방식은?",
          options: [
            "① staff 방식",
            "② line 방식",
            "③ line-staff 방식",
            "④ round 방식"
          ],
          answer: 2,
          explanation: "라인형(직계식)은 안전관리에 관한 모든 것을 생산조직을 통해 행하는 관리 방식이다. 생산과 안전을 동시에 지시하며 소규모, 보통 100명 이하 사업장에 적용된다."
        },
        {
          id: 2,
          subject: "제1과목 : 산업재해 예방 및 안전보건교육",
          question: "관리자 교육 훈련(MTP)시간으로 가장 적당한 것은?",
          options: [
            "① 20시간(4시간 × 5회)",
            "② 20시간(2시간 × 10회)",
            "③ 40시간(4시간 × 10회)",
            "④ 40시간(2시간 × 20회)"
          ],
          answer: 4,
          explanation: "관리자 교육 훈련(MTP) 시간은 40시간이며, 일반적으로 2시간씩 20회로 구성된다."
        },
        {
          id: 3,
          subject: "제1과목 : 산업재해 예방 및 안전보건교육",
          question: "집단관리의 기본적 요소에 속하지 않는 것은?",
          options: [
            "① 감정",
            "② 행위범위",
            "③ 지위와 역할",
            "④ 목표와 무관심"
          ],
          answer: 4,
          explanation: "집단관리의 기본요소는 감정, 행위범위, 지위와 역할이다. 목표와 무관심은 기본요소에 해당하지 않는다."
        },
        {
          id: 4,
          subject: "제1과목 : 산업재해 예방 및 안전보건교육",
          question: "안전교육 중 앞의 학습이 뒤의 학습에 미치는 영향을 무엇이라 하는가?",
          options: [
            "① 반사(reflex)",
            "② 반응(reaction)",
            "③ 전이(transfer)",
            "④ 효과(effect)"
          ],
          answer: 3,
          explanation: "전이(transfer)는 한 번 학습한 결과가 다른 학습이나 반응에 영향을 주는 것을 말한다."
        },
        {
          id: 5,
          subject: "제1과목 : 산업재해 예방 및 안전보건교육",
          question: "일 중심형으로 업적에 대한 관심은 높지만 인간관계에 무관심한 리더십인 타입은?",
          options: [
            "① 이상형",
            "② 권력형",
            "③ 방임형",
            "④ 중도형"
          ],
          answer: 2,
          explanation: "권력형 리더십은 일 중심형으로 업적에 대한 관심은 높지만 인간관계에 대한 관심은 낮은 유형이다."
        },
        {
          id: 6,
          subject: "제1과목 : 산업재해 예방 및 안전보건교육",
          question: "다음의 직무분석 방법 중 감독자, 동료 근로자, 그 외의 이 직무를 잘 아는 사람으로부터 성공적이지 못한 근로자와 성공적인 근로자를 구별해 내는 행동을 밝히려는 목적으로 사용되는 것은?",
          options: [
            "① 면접",
            "② 직접관찰",
            "③ 결정적 사건의 기록",
            "④ 체계적인 일지 작성"
          ],
          answer: 3,
          explanation: "결정적 사건의 기록법은 직무를 잘 아는 사람에게서 성공적인 근로자와 성공적이지 못한 근로자를 구별하는 결정적 행동 사례를 수집하는 방법이다."
        },
        {
          id: 7,
          subject: "제1과목 : 산업재해 예방 및 안전보건교육",
          question: "안전태도교육의 순서를 보기에서 골라 올바르게 나열한 것은? [보기] ㄱ. 들어본다. ㄴ. 이해시킨다. ㄷ. 시범을 보인다. ㄹ. 평가한다.",
          options: [
            "① ㄱ → ㄴ → ㄷ → ㄹ",
            "② ㄴ → ㄱ → ㄷ → ㄹ",
            "③ ㄷ → ㄴ → ㄱ → ㄹ",
            "④ ㄱ → ㄷ → ㄴ → ㄹ"
          ],
          answer: 1,
          explanation: "안전태도교육의 순서는 들어본다 → 이해시킨다 → 시범을 보인다 → 평가한다."
        },
        {
          id: 8,
          subject: "제1과목 : 산업재해 예방 및 안전보건교육",
          question: "조직의 지도자들이 부하직원들을 승진시킬 수 있고 봉급을 인상해주는 등의 능력이 있으므로 통제가 가능한 권한은?",
          options: [
            "① 위임된 권한",
            "② 합법적 권한",
            "③ 강압적 권한",
            "④ 보상적 권한"
          ],
          answer: 4,
          explanation: "보상적 권한은 승진, 보수 인상, 보상 제공 등으로 구성원을 통제할 수 있는 권한이다."
        },
        {
          id: 9,
          subject: "제1과목 : 산업재해 예방 및 안전보건교육",
          question: "바이오리듬(Biorhythm) 가운데 판단력, 추리력과 가장 관계가 깊은 리듬은?",
          options: [
            "① 지성리듬",
            "② 감성리듬",
            "③ 육체리듬",
            "④ 생활리듬"
          ],
          answer: 1,
          explanation: "지성리듬은 일반적으로 33일 주기로 반복되며 상상력, 사고력, 기억력, 추리력, 판단력 등과 관련이 깊다."
        },
        {
          id: 10,
          subject: "제1과목 : 산업재해 예방 및 안전보건교육",
          question: "인간의 의식수준 단계 중 생리적 상태가 피로하고 단조로울 때 해당되는 것은?",
          options: [
            "① Phase I",
            "② Phase II",
            "③ Phase III",
            "④ Phase IV"
          ],
          answer: 1,
          explanation: "인간 의식레벨 분류에서 Phase I은 의식이 흐리고 피로, 단조로움 상태에 해당한다."
        }
      ],
      [
        {
          id: 11,
          subject: "제1과목 : 산업재해 예방 및 안전보건교육",
          question: "합리적인 적성 배치시 고려되어야 할 기본사항이 아닌 것은?",
          options: [
            "① 인사관리의 기준 원칙에 준한다.",

    let currentPageIndex = 0;
    let currentQuestionIndex = 0;
    let timerId = null;

    const pageStates = quizPages.map(page => ({
      answers: Array(page.length).fill(null),
      marked: Array(page.length).fill(false),
      submitted: false,
      reviewMode: false,
      startedAt: Date.now()
    }));

    function getCurrentPage() {
      return quizPages[currentPageIndex].slice(0, QUESTIONS_PER_PAGE);
    }

    function getState() {
      return pageStates[currentPageIndex];
    }

    function initExam() {
      currentQuestionIndex = 0;
      document.getElementById("result-panel").style.display = "none";
      renderPageGrid();
      renderAnswerGrid();
      renderQuestion();
      updateCounts();
      startTimer();
    }

    function startTimer() {
      if (timerId) clearInterval(timerId);
      timerId = setInterval(() => {
        const state = getState();
        const seconds = Math.floor((Date.now() - state.startedAt) / 1000);
        const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
        const ss = String(seconds % 60).padStart(2, "0");
        document.getElementById("timer").textContent = `${mm}:${ss}`;
      }, 500);
    }

    function renderPageGrid() {
      const grid = document.getElementById("page-grid");
      grid.innerHTML = "";

      quizPages.forEach((page, index) => {
        const firstId = page[0].displayNo ?? page[0].id;
        const lastId = page[page.length - 1].displayNo ?? page[page.length - 1].id;
        const subjectShort = (page[0].subject || "CBT").split(":")[0].trim();
        const btn = document.createElement("button");
        btn.className = "page-btn";
        if (index === currentPageIndex) btn.classList.add("active");
        btn.textContent = `${subjectShort} ${firstId}~${lastId}번`;
        btn.title = page[0].subject || "CBT 모의고사";
        btn.onclick = () => changePage(index);
        grid.appendChild(btn);
      });
    }

    function changePage(pageIndex) {
      if (pageIndex < 0 || pageIndex >= quizPages.length) return;
      currentPageIndex = pageIndex;
      currentQuestionIndex = 0;
      document.getElementById("result-panel").style.display = "none";
      renderPageGrid();
      renderQuestion();
      updateCounts();
      startTimer();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function prevPage() {
      changePage(currentPageIndex - 1);
    }

    function nextPage() {
      changePage(currentPageIndex + 1);
    }

    function renderQuestion() {
      const page = getCurrentPage();
      const state = getState();
      const q = page[currentQuestionIndex];

      document.getElementById("subject-title").textContent = q.subject || "CBT 모의고사";
      document.getElementById("question-number").textContent = `${q.displayNo ?? q.id}번 문제`;
      document.getElementById("question-text").textContent = q.question;
      document.getElementById("mark-checkbox").checked = state.marked[currentQuestionIndex];

      const optionsEl = document.getElementById("options");
      optionsEl.innerHTML = "";

      q.options.forEach((optionText, i) => {
        const optionNumber = i + 1;
        const label = document.createElement("label");
        label.className = "option";

        if (state.answers[currentQuestionIndex] === optionNumber) {
          label.classList.add("selected");
        }

        if (state.submitted && state.reviewMode) {
          if (optionNumber === q.answer) label.classList.add("correct-answer");
          if (state.answers[currentQuestionIndex] === optionNumber && optionNumber !== q.answer) {
            label.classList.add("wrong-answer");
          }
        }

        label.innerHTML = `
          <input type="radio" name="answer" value="${optionNumber}" ${state.answers[currentQuestionIndex] === optionNumber ? "checked" : ""} ${state.submitted ? "disabled" : ""}>
          <span>${optionText}</span>
        `;

        label.addEventListener("click", () => {
          if (!state.submitted) selectAnswer(optionNumber);
        });

        optionsEl.appendChild(label);
      });

      const statusLine = document.getElementById("status-line");
      const explanation = document.getElementById("explanation");

      if (state.submitted && state.reviewMode) {
        const userAnswer = state.answers[currentQuestionIndex];
        const isCorrect = userAnswer === q.answer;
        statusLine.className = `status-line ${isCorrect ? "correct" : "wrong"}`;
        statusLine.textContent = isCorrect
          ? "⭕ 정답입니다."
          : `❌ 오답입니다. 선택: ${userAnswer ? userAnswer + "번" : "미응답"} / 정답: ${q.answer}번`;

        explanation.style.display = "block";
        explanation.innerHTML = `<strong>[해설]</strong><br>${q.explanation}`;
      } else {
        statusLine.className = "status-line";
        statusLine.textContent = "";
        explanation.style.display = "none";
        explanation.innerHTML = "";
      }

      document.getElementById("prev-btn").disabled = currentQuestionIndex === 0;
      document.getElementById("next-btn").disabled = currentQuestionIndex === page.length - 1;
      document.getElementById("prev-page-btn").disabled = currentPageIndex === 0;
      document.getElementById("next-page-btn").disabled = currentPageIndex === quizPages.length - 1;
      document.getElementById("submit-btn").disabled = state.submitted;
      document.getElementById("side-submit-btn").disabled = state.submitted;
      document.getElementById("submit-btn").textContent = state.submitted ? "제출 완료" : "최종 제출";
      document.getElementById("side-submit-btn").textContent = state.submitted ? "제출 완료" : "최종 제출";

      updateCounts();
      renderAnswerGrid();
      renderPageGrid();
    }

    function renderAnswerGrid() {
      const page = getCurrentPage();
      const state = getState();
      const grid = document.getElementById("answer-grid");
      grid.innerHTML = "";

      page.forEach((q, index) => {
        const btn = document.createElement("button");
        btn.className = "nav-num";
        btn.textContent = q.displayNo ?? q.id;

        if (index === currentQuestionIndex) btn.classList.add("current");

        if (state.submitted && state.reviewMode) {
          if (state.answers[index] === q.answer) btn.classList.add("correct");
          else btn.classList.add("wrong");
        } else {
          if (state.answers[index] !== null) btn.classList.add("answered");
          if (state.marked[index]) btn.classList.add("marked");
        }

        btn.onclick = () => {
          currentQuestionIndex = index;
          renderQuestion();
        };

        grid.appendChild(btn);
      });
    }

    function selectAnswer(optionNumber) {
      const state = getState();
      state.answers[currentQuestionIndex] = optionNumber;
      renderQuestion();
    }

    function toggleMark() {
      const state = getState();
      state.marked[currentQuestionIndex] = document.getElementById("mark-checkbox").checked;
      renderAnswerGrid();
      updateCounts();
    }

    function prevQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
      }
    }

    function nextQuestion() {
      const page = getCurrentPage();
      if (currentQuestionIndex < page.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    }

    function goFirstUnanswered() {
      const state = getState();
      const first = state.answers.findIndex(answer => answer === null);
      if (first === -1) {
        alert("미응답 문제가 없습니다.");
        return;
      }
      currentQuestionIndex = first;
      renderQuestion();
    }

    function updateCounts() {
      const page = getCurrentPage();
      const state = getState();
      const answeredCount = state.answers.filter(answer => answer !== null).length;
      const markedCount = state.marked.filter(Boolean).length;

      document.getElementById("answered-count").textContent = `답안 ${answeredCount} / ${page.length}`;
      const subjectShort = (page[0].subject || "CBT").split(":")[0].trim();
      document.getElementById("page-title").textContent = `${subjectShort} ${currentPageIndex + 1}페이지 / ${page.length}문제`;
      document.getElementById("progress-text").innerHTML =
        `응답: <strong>${answeredCount}</strong> / ${page.length}<br>` +
        `미응답: <strong>${page.length - answeredCount}</strong><br>` +
        `검토 표시: <strong>${markedCount}</strong>`;
    }

    function submitExam() {
      const page = getCurrentPage();
      const state = getState();
      if (state.submitted) return;

      const unanswered = state.answers.filter(answer => answer === null).length;

      if (unanswered > 0) {
        const ok = confirm(`아직 ${unanswered}문제를 풀지 않았습니다. 그래도 제출할까요?`);
        if (!ok) return;
      } else {
        const ok = confirm("답안을 최종 제출할까요?");
        if (!ok) return;
      }

      state.submitted = true;
      state.reviewMode = false;

      const score = page.reduce((sum, q, index) => {
        return sum + (state.answers[index] === q.answer ? 1 : 0);
      }, 0);

      const resultPanel = document.getElementById("result-panel");
      resultPanel.style.display = "block";
      document.getElementById("score-big").textContent = `${score * 10}점`;
      const subjectShort = (page[0].subject || "CBT").split(":")[0].trim();
      document.getElementById("score-detail").textContent =
        `${subjectShort} ${currentPageIndex + 1}페이지: 총 ${page.length}문제 중 ${score}문제 정답, ${page.length - score}문제 오답 또는 미응답`;

      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showReviewMode() {
      const state = getState();
      state.submitted = true;
      state.reviewMode = true;
      currentQuestionIndex = 0;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetCurrentPage() {
      const ok = confirm("현재 페이지 답안을 모두 지우고 처음부터 다시 풀까요?");
      if (!ok) return;

      const page = getCurrentPage();
      pageStates[currentPageIndex] = {
        answers: Array(page.length).fill(null),
        marked: Array(page.length).fill(false),
        submitted: false,
        reviewMode: false,
        startedAt: Date.now()
      };

      currentQuestionIndex = 0;
      document.getElementById("result-panel").style.display = "none";
      renderQuestion();
      startTimer();
    }

    initExam();
  </script>
</body>
</html>
