<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>산업안전기사 CBT - 전체 텍스트 통합본</title>
  <style>
    :root {
      --bg: #f2f4f7;
      --panel: #ffffff;
      --line: #d9dde3;
      --text: #1f2937;
      --muted: #6b7280;
      --dark: #111827;
      --blue: #1d4ed8;
      --blue-light: #e8f0ff;
      --green: #15803d;
      --green-light: #e8f7ee;
      --red: #b91c1c;
      --red-light: #fdecec;
      --yellow: #f59e0b;
      --yellow-light: #fff7df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .topbar {
      background: var(--dark);
      color: #fff;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 800;
      white-space: nowrap;
    }

    .topbar-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 7px 10px;
      border-radius: 999px;
      font-weight: 700;
    }

    .layout {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 18px;
    }

    .exam-panel,
    .side-panel,
    .result-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(17, 24, 39, 0.06);
    }

    .exam-panel {
      min-height: 620px;
      display: flex;
      flex-direction: column;
    }

    .exam-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      background: #fbfcfe;
      border-radius: 12px 12px 0 0;
    }

    .exam-head strong { font-size: 18px; }

    .exam-body {
      padding: 26px 28px;
      flex: 1;
    }

    .question-number {
      font-size: 15px;
      color: var(--blue);
      font-weight: 800;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 22px;
      line-height: 1.55;
      font-weight: 800;
      margin-bottom: 26px;
      word-break: keep-all;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 15px 16px;
      border: 2px solid var(--line);
      border-radius: 10px;
      cursor: pointer;
      background: #fff;
      transition: 0.15s;
      line-height: 1.45;
      font-size: 17px;
      min-height: 58px;
    }

    .option:hover {
      border-color: #9ca3af;
      background: #fafafa;
    }

    .option input {
      margin-top: 4px;
      transform: scale(1.25);
      accent-color: var(--blue);
    }

    .option.selected {
      border-color: var(--blue);
      background: var(--blue-light);
      font-weight: 800;
    }

    .option.correct-answer {
      border-color: var(--green);
      background: var(--green-light);
    }

    .option.wrong-answer {
      border-color: var(--red);
      background: var(--red-light);
    }

    .exam-foot {
      padding: 18px 22px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      background: #fbfcfe;
      border-radius: 0 0 12px 12px;
    }

    button {
      border: 0;
      cursor: pointer;
      font-family: inherit;
      font-weight: 800;
      border-radius: 9px;
      padding: 12px 16px;
      font-size: 15px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .btn-light {
      background: #eef1f5;
      color: var(--dark);
      border: 1px solid #d5d9df;
    }

    .btn-dark {
      background: var(--dark);
      color: #fff;
    }

    .btn-blue {
      background: var(--blue);
      color: #fff;
    }

    .btn-red {
      background: var(--red);
      color: #fff;
    }

    .side-panel {
      padding: 16px;
      align-self: start;
      position: sticky;
      top: 78px;
    }

    .side-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .progress-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .page-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .page-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 10px 8px;
      font-size: 13px;
    }

    .page-btn.active {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    .answer-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .nav-num {
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 15px;
      padding: 0;
    }

    .nav-num.current {
      outline: 3px solid rgba(29, 78, 216, 0.25);
      border-color: var(--blue);
      color: var(--blue);
    }

    .nav-num.answered {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .nav-num.marked {
      position: relative;
      border-color: var(--yellow);
      background: var(--yellow-light);
      color: #92400e;
    }

    .nav-num.correct {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .nav-num.wrong {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .legend {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin: 12px 0 16px;
    }

    .legend span::before {
      content: "";
      width: 12px;
      height: 12px;
      display: inline-block;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: -1px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .legend .lg-current::before {
      border-color: var(--blue);
      outline: 2px solid rgba(29, 78, 216, 0.25);
    }

    .legend .lg-answered::before {
      background: var(--blue);
      border-color: var(--blue);
    }

    .legend .lg-marked::before {
      background: var(--yellow-light);
      border-color: var(--yellow);
    }

    .side-actions {
      display: grid;
      gap: 8px;
    }

    .result-panel {
      display: none;
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto 18px;
      padding: 20px;
    }

    .result-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .score-big {
      font-size: 36px;
      font-weight: 900;
      margin: 8px 0 6px;
    }

    .score-detail {
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 16px;
    }

    .explanation {
      margin-top: 18px;
      background: #f8fafc;
      border-left: 6px solid var(--blue);
      padding: 16px;
      border-radius: 8px;
      line-height: 1.65;
      font-size: 15px;
    }

    .status-line {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      font-weight: 900;
      display: none;
    }

    .status-line.correct {
      display: block;
      background: var(--green-light);
      color: var(--green);
    }

    .status-line.wrong {
      display: block;
      background: var(--red-light);
      color: var(--red);
    }

    .mark-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      user-select: none;
    }

    .mark-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--yellow);
    }


    .question-media {
      margin: -8px 0 22px;
    }

    .org-diagram,
    .formula-box {
      border: 1px solid var(--line);
      background: #fbfcfe;
      border-radius: 12px;
      padding: 16px;
      overflow-x: auto;
    }

    .org-title,
    .formula-title {
      font-weight: 900;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .formula-box {
      line-height: 1.75;
      font-size: 16px;
    }

    .formula-box .formula-main {
      margin-top: 8px;
      font-weight: 900;
      color: var(--red);
    }



    .original-diagram-box {
      display: inline-block;
      max-width: 100%;
      background: #fff;
      padding: 10px 12px;
    }

    .original-problem-img {
      display: block;
      max-width: min(100%, 280px);
      height: auto;
    }

    .safety-org-svg {
      width: min(100%, 720px);
      min-width: 520px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .safety-org-svg text {
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      fill: #111827;
    }



    /* compact UI redesign: top action bar + shorter side page selector */
    .layout {
      width: min(1220px, calc(100% - 24px));
      margin: 12px auto;
      grid-template-columns: minmax(0, 1fr) 250px;
      gap: 12px;
      align-items: start;
    }

    .exam-head {
      padding: 14px 18px;
    }

    .exam-body {
      padding: 18px 22px 22px;
    }

    .question-text {
      margin-bottom: 18px;
    }

    .exam-foot {
      position: sticky;
      top: 58px;
      z-index: 9;
      padding: 10px 14px;
      border-top: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      align-items: center;
      background: rgba(251, 252, 254, 0.96);
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 14px rgba(17, 24, 39, 0.08);
    }

    .exam-foot > div {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .exam-foot button {
      padding: 9px 12px;
      font-size: 14px;
      min-height: 40px;
    }

    .side-panel {
      padding: 12px;
      top: 72px;
      max-height: calc(100vh - 86px);
      overflow-y: auto;
    }

    .side-title {
      font-size: 16px;
      margin-bottom: 8px;
      padding-bottom: 8px;
    }

    .page-jump {
      display: grid;
      grid-template-columns: 38px 1fr 38px;
      gap: 6px;
      margin-bottom: 8px;
      align-items: stretch;
    }

    .page-mini-btn,
    .page-select {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: var(--text);
      font-family: inherit;
      font-weight: 800;
      min-height: 40px;
    }

    .page-mini-btn {
      padding: 0;
      font-size: 22px;
      line-height: 1;
    }

    .page-select {
      width: 100%;
      padding: 0 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .compact-page-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }

    .compact-page-grid .page-btn {
      padding: 8px 4px;
      min-height: 36px;
      font-size: 12px;
      border-radius: 8px;
    }

    .page-ellipsis {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 900;
      min-height: 36px;
    }

    .shortcut-hint {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px 9px;
      margin: 8px 0 12px;
    }

    .progress-text {
      margin-bottom: 10px;
      font-size: 13px;
    }

    .answer-grid {
      gap: 6px;
      margin-bottom: 10px;
    }

    .nav-num {
      height: 38px;
      font-size: 14px;
    }

    .legend {
      grid-template-columns: 1fr 1fr;
      gap: 6px 8px;
      margin: 8px 0 12px;
      font-size: 12px;
    }

    .side-actions {
      gap: 6px;
    }

    .side-actions button {
      padding: 10px 12px;
      font-size: 13px;
    }



    .wrongnote-panel {
      display: none;
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto 18px;
      padding: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(17, 24, 39, 0.06);
    }

    .wrongnote-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .wrongnote-title {
      font-size: 22px;
      font-weight: 900;
    }

    .wrongnote-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .wrongnote-select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 0 10px;
      font-family: inherit;
      font-weight: 800;
      background: #fff;
      color: var(--text);
    }

    .wrongnote-summary {
      color: var(--muted);
      font-weight: 800;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .wrongnote-list {
      display: grid;
      gap: 12px;
    }

    .wrongnote-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      background: #fbfcfe;
    }

    .wrongnote-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .wrongnote-card-title {
      font-weight: 900;
      line-height: 1.5;
    }

    .wrongnote-card-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .wrongnote-options {
      margin: 8px 0;
      display: grid;
      gap: 5px;
      font-size: 14px;
      line-height: 1.45;
    }

    .wrongnote-answer-line {
      margin-top: 8px;
      padding: 9px 10px;
      border-radius: 8px;
      background: var(--red-light);
      color: var(--red);
      font-weight: 900;
      line-height: 1.5;
    }

    .wrongnote-explanation {
      margin-top: 8px;
      line-height: 1.6;
      font-size: 14px;
    }

    .wrongnote-empty {
      padding: 18px;
      border-radius: 10px;
      background: #f8fafc;
      color: var(--muted);
      font-weight: 800;
      text-align: center;
      border: 1px dashed var(--line);
    }



    .restore-shot-box {
      width: 100%;
      max-width: 980px;
      overflow-x: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
    }

    .restore-shot {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
    }

    .restore-explain-title {
      font-weight: 900;
      margin-bottom: 8px;
      color: var(--dark);
    }


    .review-text-box {
      margin: -6px 0 18px;
      padding: 12px 14px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      color: #374151;
      line-height: 1.65;
      white-space: pre-wrap;
      font-size: 15px;
    }
    .wrongnote-media { margin: 10px 0 12px; }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .exam-foot {
        position: sticky;
        top: 92px;
      }

      .exam-foot button {
        flex: 1 1 120px;
      }

      .side-panel {
        max-height: none;
        overflow: visible;
      }

      .side-panel {
        position: static;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .topbar-info {
        justify-content: flex-start;
      }

      .question-text {
        font-size: 19px;
      }
    }


    /* sprite-bundled restored screenshots: only a few files, no broken 100+ asset uploads */
    .sprite-shot {
      display: block;
      width: min(100%, calc(var(--shot-w) * 1px));
      max-width: 100%;
      height: auto;
      background: #fff;
      border-radius: 8px;
    }

    .restore-shot-box {
      max-width: 100%;
      overflow-x: auto;
      padding: 4px 0;
    }

  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-title">산업안전기사 필기 CBT</div>
    <div class="topbar-info">
      <span class="pill" id="page-title">1페이지 / 10문제</span>
      <span class="pill" id="timer">00:00</span>
      <span class="pill" id="answered-count">답안 0 / 10</span>
    </div>
  </header>

  <main class="layout">
    <section class="exam-panel">
      <div class="exam-head">
        <strong id="subject-title">제1과목 : 산업재해 예방 및 안전보건교육</strong>
        <label class="mark-row">
          <input type="checkbox" id="mark-checkbox" onchange="toggleMark()" />
          검토 표시
        </label>
      </div>


      <div class="exam-foot">
        <div>
          <button class="btn-light" id="prev-btn" onclick="prevQuestion()">이전 문제</button>
          <button class="btn-light" id="next-btn" onclick="nextQuestion()">다음 문제</button>
        </div>
        <div>
          <button class="btn-light" id="prev-page-btn" onclick="prevPage()">이전 10문제</button>
          <button class="btn-light" id="next-page-btn" onclick="nextPage()">다음 10문제</button>
          <button class="btn-red" onclick="resetCurrentPage()">현재 페이지 다시 풀기</button>
          <button class="btn-blue" id="submit-btn" onclick="submitExam()">최종 제출</button>
        </div>
      </div>

      <div class="exam-body">
        <div class="question-number" id="question-number"></div>
        <div class="question-text" id="question-text"></div>
        <div class="question-media" id="question-media"></div>
        <div class="options" id="options"></div>
        <div class="status-line" id="status-line"></div>
        <div class="explanation" id="explanation" style="display:none;"></div>
      </div>
    </section>

    <aside class="side-panel">
      <div class="side-title">페이지 이동</div>
      <div class="page-jump">
        <button class="page-mini-btn" onclick="prevPage()" title="이전 10문제">‹</button>
        <select class="page-select" id="page-select" onchange="changePage(Number(this.value))" aria-label="페이지 선택"></select>
        <button class="page-mini-btn" onclick="nextPage()" title="다음 10문제">›</button>
      </div>
      <div class="page-grid compact-page-grid" id="page-grid"></div>
      <div class="shortcut-hint">단축키: 1~4 선택 · ←/→ 문제 · PageUp/PageDown 10문제 · M 검토</div>

      <div class="side-title">답안 현황</div>
      <div class="progress-text" id="progress-text">
        문제 번호를 누르면 해당 문제로 이동합니다.
      </div>
      <div class="answer-grid" id="answer-grid"></div>
      <div class="legend">
        <span class="lg-current">현재 문제</span>
        <span class="lg-answered">답안 선택</span>
        <span class="lg-marked">검토 표시</span>
      </div>
      <div class="side-actions">
        <button class="btn-dark" onclick="goFirstUnanswered()">미응답 문제로 이동</button>
        <button class="btn-light" onclick="showWrongNoteLibrary()">오답노트 보기</button>
        <button class="btn-light" onclick="showCurrentSubjectWrongNotes()">현재 과목 오답</button>
        <button class="btn-blue" id="side-submit-btn" onclick="submitExam()">최종 제출</button>
      </div>
    </aside>
  </main>

  <section class="result-panel" id="result-panel">
    <div class="result-title">채점 결과</div>
    <div class="score-big" id="score-big"></div>
    <div class="score-detail" id="score-detail"></div>
    <button class="btn-dark" onclick="showReviewMode()">해설 보면서 다시 확인</button>
    <button class="btn-blue" onclick="showWrongNoteLibrary()">오답노트 보기</button>
  </section>

  <section class="wrongnote-panel" id="wrongnote-panel">
    <div class="wrongnote-head">
      <div class="wrongnote-title">오답노트 라이브러리</div>
      <div class="wrongnote-tools">

    let currentPageIndex = 0;
    let currentQuestionIndex = 0;
    let timerId = null;

    const CBT_STATE_KEY = "industrialSafetyCbtStateV4";
    const CBT_WRONGNOTE_KEY = "industrialSafetyCbtWrongNotesV4";

    function createEmptyPageState(page) {
      return {
        answers: Array(page.length).fill(null),
        marked: Array(page.length).fill(false),
        submitted: false,
        reviewMode: false,
        startedAt: Date.now()
      };
    }

    function normalizeSavedPageState(savedState, page) {
      const empty = createEmptyPageState(page);
      if (!savedState || typeof savedState !== "object") return empty;

      const answers = Array.isArray(savedState.answers) ? savedState.answers.slice(0, page.length) : [];
      const marked = Array.isArray(savedState.marked) ? savedState.marked.slice(0, page.length) : [];

      while (answers.length < page.length) answers.push(null);
      while (marked.length < page.length) marked.push(false);

      return {
        answers,
        marked: marked.map(Boolean),
        submitted: Boolean(savedState.submitted),
        reviewMode: Boolean(savedState.reviewMode),
        startedAt: Number(savedState.startedAt) || Date.now()
      };
    }

    function loadExamState() {
      try {
        const raw = localStorage.getItem(CBT_STATE_KEY);
        if (!raw) return quizPages.map(createEmptyPageState);
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== 4 || parsed.pageCount !== quizPages.length || !Array.isArray(parsed.pageStates)) {
          return quizPages.map(createEmptyPageState);
        }
        return quizPages.map((page, index) => normalizeSavedPageState(parsed.pageStates[index], page));
      } catch (error) {
        console.warn("저장된 풀이 상태를 불러오지 못했습니다.", error);
        return quizPages.map(createEmptyPageState);
      }
    }

    function saveExamState() {
      try {
        localStorage.setItem(CBT_STATE_KEY, JSON.stringify({
          version: 4,
          pageCount: quizPages.length,
          savedAt: Date.now(),
          currentPageIndex,
          currentQuestionIndex,
          pageStates
        }));
      } catch (error) {
        console.warn("풀이 상태 저장 실패", error);
      }
    }

    function loadWrongNotes() {
      try {
        const raw = localStorage.getItem(CBT_WRONGNOTE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        console.warn("오답노트 불러오기 실패", error);
        return [];
      }
    }

    function saveWrongNotes(notes) {
      try {
        localStorage.setItem(CBT_WRONGNOTE_KEY, JSON.stringify(notes));
      } catch (error) {
        console.warn("오답노트 저장 실패", error);
      }
    }

    const pageStates = loadExamState();

    function getCurrentPage() {
      return quizPages[currentPageIndex].slice(0, QUESTIONS_PER_PAGE);
    }

    function getState() {
      return pageStates[currentPageIndex];
    }

    function initExam() {
      currentQuestionIndex = 0;
      document.getElementById("result-panel").style.display = "none";
      updateWrongNoteSubjectSelect("ALL");
      renderPageGrid();
      renderAnswerGrid();
      renderQuestion();
      updateCounts();
      startTimer();
    }

    function startTimer() {
      if (timerId) clearInterval(timerId);
      timerId = setInterval(() => {
        const state = getState();
        const seconds = Math.floor((Date.now() - state.startedAt) / 1000);
        const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
        const ss = String(seconds % 60).padStart(2, "0");
        document.getElementById("timer").textContent = `${mm}:${ss}`;
      }, 500);
    }

    function getPageLabel(page, index) {
      const firstNo = page[0].displayNo ?? page[0].id;
      const lastNo = page[page.length - 1].displayNo ?? page[page.length - 1].id;
      const subjectShort = (page[0].subject || "CBT").split(":")[0].trim();
      return `${index + 1}페이지 · ${subjectShort} ${firstNo}~${lastNo}번`;
    }

    function renderPageGrid() {
      const grid = document.getElementById("page-grid");
      const select = document.getElementById("page-select");

      if (select) {
        if (select.options.length !== quizPages.length) {
          select.innerHTML = "";
          quizPages.forEach((page, index) => {
            const option = document.createElement("option");
            option.value = String(index);
            option.textContent = getPageLabel(page, index);
            select.appendChild(option);
          });
        }
        select.value = String(currentPageIndex);
      }

      grid.innerHTML = "";

      const visibleIndexes = new Set([0, quizPages.length - 1]);
      for (let i = currentPageIndex - 2; i <= currentPageIndex + 2; i++) {
        if (i >= 0 && i < quizPages.length) visibleIndexes.add(i);
      }

      const indexes = Array.from(visibleIndexes).sort((a, b) => a - b);
      let previousIndex = null;

      indexes.forEach(index => {
        if (previousIndex !== null && index - previousIndex > 1) {
          const ellipsis = document.createElement("span");
          ellipsis.className = "page-ellipsis";
          ellipsis.textContent = "…";
          grid.appendChild(ellipsis);
        }

        const page = quizPages[index];
        const firstNo = page[0].displayNo ?? page[0].id;
        const lastNo = page[page.length - 1].displayNo ?? page[page.length - 1].id;
        const btn = document.createElement("button");
        btn.className = "page-btn";
        if (index === currentPageIndex) btn.classList.add("active");
        btn.textContent = `${firstNo}~${lastNo}`;
        btn.title = getPageLabel(page, index);
        btn.onclick = () => changePage(index);
        grid.appendChild(btn);
        previousIndex = index;
      });
    }

    function changePage(pageIndex) {
      if (pageIndex < 0 || pageIndex >= quizPages.length) return;
      currentPageIndex = pageIndex;
      currentQuestionIndex = 0;
      document.getElementById("result-panel").style.display = "none";
      saveExamState();
      renderPageGrid();
      renderQuestion();
      updateCounts();
      startTimer();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function prevPage() {
      changePage(currentPageIndex - 1);
    }

    function nextPage() {
      changePage(currentPageIndex + 1);
    }

    function renderQuestion() {
      const page = getCurrentPage();
      const state = getState();
      const q = page[currentQuestionIndex];

      document.getElementById("subject-title").textContent = q.subject || "CBT 모의고사";
      document.getElementById("question-number").textContent = `${q.displayNo ?? q.id}번 문제`;
      document.getElementById("question-text").textContent = q.question;

      // 일반 문제 풀이 화면에는 문제와 보기만 표시한다.
      // reviewText / ocrText / imageHtml은 오답노트·내부 검토용 데이터로만 보관하고 화면에는 출력하지 않는다.
      const oldReviewBox = document.getElementById("review-text-box");
      if (oldReviewBox) oldReviewBox.remove();

      const mediaEl = document.getElementById("question-media");
      mediaEl.innerHTML = "";
      mediaEl.style.display = "none";

      document.getElementById("mark-checkbox").checked = state.marked[currentQuestionIndex];

      const optionsEl = document.getElementById("options");
      optionsEl.innerHTML = "";

      q.options.forEach((optionText, i) => {
        const optionNumber = i + 1;
        const label = document.createElement("label");
        label.className = "option";

        if (state.answers[currentQuestionIndex] === optionNumber) {
          label.classList.add("selected");
        }

        if (state.submitted && state.reviewMode) {
          if (optionNumber === q.answer) label.classList.add("correct-answer");
          if (state.answers[currentQuestionIndex] === optionNumber && optionNumber !== q.answer) {
            label.classList.add("wrong-answer");
          }
        }

        label.innerHTML = `
          <input type="radio" name="answer" value="${optionNumber}" ${state.answers[currentQuestionIndex] === optionNumber ? "checked" : ""} ${state.submitted ? "disabled" : ""}>
          <span>${optionText}</span>
        `;

        label.addEventListener("click", () => {
          if (!state.submitted) selectAnswer(optionNumber);
        });

        optionsEl.appendChild(label);
      });

      const statusLine = document.getElementById("status-line");
      const explanation = document.getElementById("explanation");

      if (state.submitted && state.reviewMode) {
        const userAnswer = state.answers[currentQuestionIndex];
        const isCorrect = userAnswer === q.answer;
        statusLine.className = `status-line ${isCorrect ? "correct" : "wrong"}`;
        statusLine.textContent = isCorrect
          ? "⭕ 정답입니다."
          : `❌ 오답입니다. 선택: ${userAnswer ? userAnswer + "번" : "미응답"} / 정답: ${q.answer}번`;

        explanation.style.display = "block";
        explanation.innerHTML = `<strong>[해설]</strong><br>${q.explanation}`;
      } else {
        statusLine.className = "status-line";
        statusLine.textContent = "";
        explanation.style.display = "none";
        explanation.innerHTML = "";
      }

      document.getElementById("prev-btn").disabled = currentQuestionIndex === 0;
      document.getElementById("next-btn").disabled = currentQuestionIndex === page.length - 1;
      document.getElementById("prev-page-btn").disabled = currentPageIndex === 0;
      document.getElementById("next-page-btn").disabled = currentPageIndex === quizPages.length - 1;
      document.getElementById("submit-btn").disabled = state.submitted;
      document.getElementById("side-submit-btn").disabled = state.submitted;
      document.getElementById("submit-btn").textContent = state.submitted ? "제출 완료" : "최종 제출";
      document.getElementById("side-submit-btn").textContent = state.submitted ? "제출 완료" : "최종 제출";

      updateCounts();
      renderAnswerGrid();
      renderPageGrid();
    }

    function renderAnswerGrid() {
      const page = getCurrentPage();
      const state = getState();
      const grid = document.getElementById("answer-grid");
      grid.innerHTML = "";

      page.forEach((q, index) => {
        const btn = document.createElement("button");
        btn.className = "nav-num";
        btn.textContent = q.displayNo ?? q.id;

        if (index === currentQuestionIndex) btn.classList.add("current");

        if (state.submitted && state.reviewMode) {
          if (state.answers[index] === q.answer) btn.classList.add("correct");
          else btn.classList.add("wrong");
        } else {
          if (state.answers[index] !== null) btn.classList.add("answered");
          if (state.marked[index]) btn.classList.add("marked");
        }

        btn.onclick = () => {
          currentQuestionIndex = index;
          renderQuestion();
        };

        grid.appendChild(btn);
      });
    }

    function selectAnswer(optionNumber) {
      const state = getState();
      state.answers[currentQuestionIndex] = optionNumber;
      saveExamState();
      renderQuestion();
    }

    function toggleMark() {
      const state = getState();
      state.marked[currentQuestionIndex] = document.getElementById("mark-checkbox").checked;
      saveExamState();
      renderAnswerGrid();
      updateCounts();
    }

    function prevQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
      }
    }

    function nextQuestion() {
      const page = getCurrentPage();
      if (currentQuestionIndex < page.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    }

    function goFirstUnanswered() {
      const state = getState();
      const first = state.answers.findIndex(answer => answer === null);
      if (first === -1) {
        alert("미응답 문제가 없습니다.");
        return;
      }
      currentQuestionIndex = first;
      renderQuestion();
    }

    function updateCounts() {
      const page = getCurrentPage();
      const state = getState();
      const answeredCount = state.answers.filter(answer => answer !== null).length;
      const markedCount = state.marked.filter(Boolean).length;

      document.getElementById("answered-count").textContent = `답안 ${answeredCount} / ${page.length}`;
      const subjectShort = (page[0].subject || "CBT").split(":")[0].trim();
      const firstNo = page[0].displayNo ?? page[0].id;
      const lastNo = page[page.length - 1].displayNo ?? page[page.length - 1].id;
      document.getElementById("page-title").textContent = `${subjectShort} ${firstNo}~${lastNo}번 / ${page.length}문제`;
      document.getElementById("progress-text").innerHTML =
        `응답: <strong>${answeredCount}</strong> / ${page.length}<br>` +
        `미응답: <strong>${page.length - answeredCount}</strong><br>` +
        `검토 표시: <strong>${markedCount}</strong>`;
    }

    function getAllExamStats() {
      let total = 0;
      let answered = 0;
      let correct = 0;
      const subjectStats = {};

      quizPages.forEach((page, pageIndex) => {
        const visibleQuestions = page.slice(0, QUESTIONS_PER_PAGE);
        const state = pageStates[pageIndex];

        visibleQuestions.forEach((q, questionIndex) => {
          total++;

          const userAnswer = state.answers[questionIndex];
          const subject = q.subject || "기타";

          if (!subjectStats[subject]) {
            subjectStats[subject] = {
              total: 0,
              answered: 0,
              correct: 0
            };
          }

          subjectStats[subject].total++;

          if (userAnswer !== null && userAnswer !== undefined) {
            answered++;
            subjectStats[subject].answered++;
          }

          if (userAnswer === q.answer) {
            correct++;
            subjectStats[subject].correct++;
          }
        });
      });

      const unanswered = total - answered;
      const wrong = total - correct;
      const score = total > 0 ? Math.round((correct / total) * 1000) / 10 : 0;
      const answeredAccuracy = answered > 0 ? Math.round((correct / answered) * 1000) / 10 : 0;

      return {
        total,
        answered,
        unanswered,
        correct,
        wrong,
        score,
        answeredAccuracy,
        subjectStats
      };
    }


    function getQuestionKey(q) {
      return `${q.subject || "기타"}|${q.displayNo ?? q.id}`;
    }

    function getAllSubjects() {
      return [...new Set(quizPages.flat().map(q => q.subject || "기타"))];
    }

    function collectWrongNotesFromCurrentState() {
      const notes = [];
      quizPages.forEach((page, pageIndex) => {
        page.slice(0, QUESTIONS_PER_PAGE).forEach((q, questionIndex) => {
          const state = pageStates[pageIndex];
          const userAnswer = state.answers[questionIndex];
          const isAnswered = userAnswer !== null && userAnswer !== undefined;
          const isWrong = isAnswered ? userAnswer !== q.answer : Boolean(state.submitted);
          if (!isWrong) return;

          notes.push({
            key: getQuestionKey(q),
            id: q.id,
            displayNo: q.displayNo ?? q.id,
            subject: q.subject || "기타",
            question: q.question,
            options: q.options,
            answer: q.answer,
            explanation: q.explanation,
            imageHtml: q.imageHtml || "",
            reviewText: q.ocrText || q.reviewText || "",
            userAnswer: isAnswered ? userAnswer : null,
            pageIndex,
            questionIndex,
            savedAt: Date.now()
          });
        });
      });
      return notes;
    }

    function saveWrongNotesFromCurrentState() {
      const existing = loadWrongNotes();
      const existingMap = new Map(existing.map(note => [note.key, note]));
      collectWrongNotesFromCurrentState().forEach(note => existingMap.set(note.key, note));

      // 이미 맞힌 문제는 오답노트에서 자동 제거한다.
      quizPages.forEach((page, pageIndex) => {
        page.slice(0, QUESTIONS_PER_PAGE).forEach((q, questionIndex) => {
          const userAnswer = pageStates[pageIndex].answers[questionIndex];
          if (userAnswer === q.answer) existingMap.delete(getQuestionKey(q));
        });
      });

      const merged = [...existingMap.values()].sort((a, b) => {
        const sa = String(a.subject).localeCompare(String(b.subject), "ko");
        if (sa !== 0) return sa;
        return Number(a.displayNo) - Number(b.displayNo);
      });
      saveWrongNotes(merged);
      return merged;
    }

    function updateWrongNoteSubjectSelect(selectedSubject = "ALL") {
      const select = document.getElementById("wrongnote-subject-select");
      if (!select) return;
      const notes = loadWrongNotes();
      const subjects = [...new Set(notes.map(note => note.subject))];

      select.innerHTML = "";
      const allOption = document.createElement("option");
      allOption.value = "ALL";
      allOption.textContent = `전체 오답 ${notes.length}개`;
      select.appendChild(allOption);

      subjects.forEach(subject => {
        const option = document.createElement("option");
        option.value = subject;
        option.textContent = `${subject} · ${notes.filter(note => note.subject === subject).length}개`;
        select.appendChild(option);
      });

      select.value = selectedSubject;
      if (select.value !== selectedSubject) select.value = "ALL";
    }

    function renderWrongNotes(subjectFilter = "ALL") {
      updateWrongNoteSubjectSelect(subjectFilter);
      const panel = document.getElementById("wrongnote-panel");
      const summary = document.getElementById("wrongnote-summary");
      const list = document.getElementById("wrongnote-list");
      if (!panel || !summary || !list) return;

      const allNotes = loadWrongNotes();
      const notes = subjectFilter === "ALL" ? allNotes : allNotes.filter(note => note.subject === subjectFilter);
      panel.style.display = "block";

      const subjectCounts = getAllSubjects()
        .map(subject => `${subject.replace(/^제/, "제")} ${allNotes.filter(note => note.subject === subject).length}개`)
        .join(" · ");

      summary.innerHTML =
        `저장된 오답/미응답: <strong>${allNotes.length}</strong>개` +
        (subjectCounts ? `<br>${subjectCounts}` : "") +
        `<br>최종 제출 시 오답노트가 자동 저장되며, 브라우저를 껐다 켜도 유지됩니다.`;

      if (notes.length === 0) {
        list.innerHTML = `<div class="wrongnote-empty">저장된 오답이 없습니다. 문제를 풀고 최종 제출하면 오답만 여기에 저장됩니다.</div>`;
        return;
      }

      list.innerHTML = notes.map(note => {
        const selectedText = note.userAnswer ? `${note.userAnswer}번` : "미응답";
        const correctText = `${note.answer}번`;
        const optionsHtml = (note.options || []).map(option => `<div>${option}</div>`).join("");
        return `
          <article class="wrongnote-card">
            <div class="wrongnote-card-head">
              <div class="wrongnote-card-title">${note.subject} · ${note.displayNo}번<br>${note.question}</div>
              <div class="wrongnote-card-meta">ID ${note.id}</div>
            </div>
            <div class="wrongnote-options">${optionsHtml}</div>
            <div class="wrongnote-answer-line">선택: ${selectedText} / 정답: ${correctText}</div>
            <div class="wrongnote-explanation"><strong>[해설]</strong><br>${note.explanation || "해설 없음"}</div>
            <div style="margin-top:10px;">
              <button class="btn-light" onclick="goToWrongNoteQuestion('${String(note.subject).replace(/'/g, "\\'")}', ${Number(note.displayNo)})">해당 문제로 이동</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function showWrongNoteLibrary() {
      saveWrongNotesFromCurrentState();
      renderWrongNotes("ALL");
      document.getElementById("wrongnote-panel").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function showCurrentSubjectWrongNotes() {
      saveWrongNotesFromCurrentState();
      const page = getCurrentPage();
      const subject = page[0]?.subject || "ALL";
      renderWrongNotes(subject);
      document.getElementById("wrongnote-panel").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function hideWrongNoteLibrary() {
      const panel = document.getElementById("wrongnote-panel");
      if (panel) panel.style.display = "none";
    }

    function clearWrongNotes() {
      const ok = confirm("저장된 오답노트를 모두 삭제할까요? 풀이 답안은 유지됩니다.");
      if (!ok) return;
      saveWrongNotes([]);
      renderWrongNotes("ALL");
    }

    function goToWrongNoteQuestion(subject, displayNo) {
      for (let pageIndex = 0; pageIndex < quizPages.length; pageIndex++) {
        const questionIndex = quizPages[pageIndex]
          .slice(0, QUESTIONS_PER_PAGE)
          .findIndex(q => (q.subject || "기타") === subject && Number(q.displayNo ?? q.id) === Number(displayNo));
        if (questionIndex >= 0) {
          currentPageIndex = pageIndex;
          currentQuestionIndex = questionIndex;
          pageStates[pageIndex].submitted = true;
          pageStates[pageIndex].reviewMode = true;
          saveExamState();
          renderQuestion();
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }
      }
      alert("해당 문제를 현재 문항 데이터에서 찾지 못했습니다.");
    }

    function submitExam() {
      const stats = getAllExamStats();

      if (stats.unanswered > 0) {
        const ok = confirm(
          `아직 전체 ${stats.unanswered}문제를 풀지 않았습니다.\n그래도 전체 시험을 제출하고 채점할까요?`
        );
        if (!ok) return;
      } else {
        const ok = confirm("전체 시험을 최종 제출하고 채점할까요?");
        if (!ok) return;
      }

      pageStates.forEach(state => {
        state.submitted = true;
        state.reviewMode = false;
      });
      saveExamState();
      saveWrongNotesFromCurrentState();

      if (timerId) clearInterval(timerId);

      const subjectSummary = Object.entries(stats.subjectStats)
        .map(([subject, s]) => {
          const subjectScore = s.total > 0
            ? Math.round((s.correct / s.total) * 1000) / 10
            : 0;

          return `
            <div style="margin-top:8px; padding:8px 10px; background:#f8fafc; border:1px solid #e5e7eb; border-radius:8px; line-height:1.6;">
              <strong>${subject}</strong><br>
              ${subjectScore}점 / ${s.total}문제 중 ${s.correct}문제 정답, ${s.total - s.correct}문제 오답 또는 미응답<br>
              응답: ${s.answered}문제 / 미응답: ${s.total - s.answered}문제
            </div>
          `;
        })
        .join("");

      const resultPanel = document.getElementById("result-panel");
      resultPanel.style.display = "block";

      document.getElementById("score-big").textContent = `${stats.score}점`;
      document.getElementById("score-detail").innerHTML =
        `전체 ${stats.total}문제 중 ` +
        `<strong>${stats.correct}</strong>문제 정답, ` +
        `<strong>${stats.wrong}</strong>문제 오답 또는 미응답<br>` +
        `응답: ${stats.answered}문제 / 미응답: ${stats.unanswered}문제<br>` +
        `푼 문제 기준 정답률: ${stats.answeredAccuracy}점` +
        `<br><br>` +
        subjectSummary;

      document.getElementById("submit-btn").disabled = true;
      document.getElementById("side-submit-btn").disabled = true;
      document.getElementById("submit-btn").textContent = "전체 제출 완료";
      document.getElementById("side-submit-btn").textContent = "전체 제출 완료";

      renderQuestion();
      renderAnswerGrid();
      renderPageGrid();

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showReviewMode() {
      pageStates.forEach(state => {
        state.submitted = true;
        state.reviewMode = true;
      });
      saveExamState();

      currentQuestionIndex = 0;

      renderQuestion();
      renderAnswerGrid();
      renderPageGrid();

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetCurrentPage() {
      const ok = confirm("현재 페이지 답안을 모두 지우고 처음부터 다시 풀까요?");
      if (!ok) return;

      const page = getCurrentPage();
      pageStates[currentPageIndex] = {
        answers: Array(page.length).fill(null),
        marked: Array(page.length).fill(false),
        submitted: false,
        reviewMode: false,
        startedAt: Date.now()
      };

      currentQuestionIndex = 0;
      document.getElementById("result-panel").style.display = "none";
      saveExamState();
      renderQuestion();
      startTimer();
    }


    function setupKeyboardShortcuts() {
      document.addEventListener("keydown", event => {
        const tagName = (event.target && event.target.tagName || "").toLowerCase();
        if (["input", "select", "textarea", "button"].includes(tagName)) return;
        if (event.ctrlKey || event.metaKey || event.altKey) return;

        if (["1", "2", "3", "4"].includes(event.key)) {
          const state = getState();
          if (!state.submitted) {
            selectAnswer(Number(event.key));
            event.preventDefault();
          }
          return;
        }

        if (event.key === "ArrowLeft") {
          prevQuestion();
          event.preventDefault();
          return;
        }

        if (event.key === "ArrowRight") {
          nextQuestion();
          event.preventDefault();
          return;
        }

        if (event.key === "PageUp") {
          prevPage();
          event.preventDefault();
          return;
        }

        if (event.key === "PageDown") {
          nextPage();
          event.preventDefault();
          return;
        }

        if (event.key.toLowerCase() === "m") {
          const checkbox = document.getElementById("mark-checkbox");
          checkbox.checked = !checkbox.checked;
          toggleMark();
          event.preventDefault();
        }
      });
    }

    window.addEventListener("beforeunload", saveExamState);
    setupKeyboardShortcuts();
    initExam();
  </script>
</body>
</html>
